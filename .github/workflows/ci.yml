name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      AUTH_SECRET: ci-auth-secret-32-characters-minimum-value
      DATABASE_URL: file:./ci.db
      ENABLE_DEMO_MODE: "true"
      NEXT_PUBLIC_DEMO_MODE: "true"
      AUTO_BOOTSTRAP_SCHEMA: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
